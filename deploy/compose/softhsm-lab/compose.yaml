services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${PKCS11WRAPPER_POSTGRES_DB:-pkcs11wrapper_cryptoapi}
      POSTGRES_USER: ${PKCS11WRAPPER_POSTGRES_USER:-cryptoapi}
      POSTGRES_PASSWORD: ${PKCS11WRAPPER_POSTGRES_PASSWORD:-ChangeMe!Postgres123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PKCS11WRAPPER_POSTGRES_USER:-cryptoapi} -d ${PKCS11WRAPPER_POSTGRES_DB:-pkcs11wrapper_cryptoapi}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  softhsm:
    build:
      context: ../../..
      dockerfile: deploy/compose/softhsm-lab/softhsm.Dockerfile
    environment:
      SOFTHSM2_CONF: /opt/pkcs11/softhsm/softhsm2.conf
      SOFTHSM_TOKEN_DIR: /opt/pkcs11/softhsm/tokens
      PKCS11_MODULE_PATH: /opt/pkcs11/lib/libsofthsm2.so
      SOFTHSM_AUTO_SEED: ${SOFTHSM_AUTO_SEED:-1}
      SOFTHSM_TOKEN_LABEL: ${SOFTHSM_TOKEN_LABEL:-Pkcs11Wrapper CI Token}
      SOFTHSM_USER_PIN: ${SOFTHSM_USER_PIN:-123456}
      SOFTHSM_SO_PIN: ${SOFTHSM_SO_PIN:-12345678}
      SOFTHSM_AES_LABEL: ${SOFTHSM_AES_LABEL:-ci-aes}
      SOFTHSM_AES_ID_HEX: ${SOFTHSM_AES_ID_HEX:-A1}
      SOFTHSM_RSA_LABEL: ${SOFTHSM_RSA_LABEL:-ci-rsa}
      SOFTHSM_RSA_ID_HEX: ${SOFTHSM_RSA_ID_HEX:-B2}
    volumes:
      - softhsm-state:/opt/pkcs11/softhsm
    healthcheck:
      test: ["CMD-SHELL", "test -f /opt/pkcs11/softhsm/softhsm2.conf && softhsm2-util --show-slots >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  admin:
    build:
      context: ../../..
      dockerfile: deploy/compose/softhsm-lab/admin.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      softhsm:
        condition: service_healthy
    ports:
      - "${PKCS11WRAPPER_ADMIN_PORT:-8080}:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      AdminStorage__DataRoot: /var/lib/pkcs11wrapper-admin
      AdminRuntime__DisableHttpsRedirection: "true"
      LocalAdminBootstrap__UserName: ${PKCS11WRAPPER_ADMIN_USER:-admin}
      LocalAdminBootstrap__Password: ${PKCS11WRAPPER_ADMIN_PASSWORD:-ChangeMe!123456}
      AdminBootstrapDevice__Name: ${PKCS11WRAPPER_ADMIN_DEVICE_NAME:-SoftHSM lab}
      AdminBootstrapDevice__ModulePath: /opt/pkcs11/lib/libsofthsm2.so
      AdminBootstrapDevice__DefaultTokenLabel: ${SOFTHSM_TOKEN_LABEL:-Pkcs11Wrapper CI Token}
      AdminBootstrapDevice__Notes: ${PKCS11WRAPPER_ADMIN_DEVICE_NOTES:-Local/dev/lab SoftHSM compose stack. Not production orchestrated.}
      CryptoApiSharedPersistence__Provider: Postgres
      CryptoApiSharedPersistence__ConnectionString: Host=postgres;Port=5432;Database=${PKCS11WRAPPER_POSTGRES_DB:-pkcs11wrapper_cryptoapi};Username=${PKCS11WRAPPER_POSTGRES_USER:-cryptoapi};Password=${PKCS11WRAPPER_POSTGRES_PASSWORD:-ChangeMe!Postgres123};SSL Mode=Disable
      CryptoApiSharedPersistence__AutoInitialize: "true"
      SOFTHSM2_CONF: /opt/pkcs11/softhsm/softhsm2.conf
    volumes:
      - admin-data:/var/lib/pkcs11wrapper-admin
      - softhsm-state:/opt/pkcs11/softhsm
    healthcheck:
      test: ["CMD", "dotnet", "Pkcs11Wrapper.Admin.Web.dll", "--container-healthcheck", "http://127.0.0.1:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  admin-data:
  postgres-data:
  softhsm-state:
