name: Bug report
description: Report a reproducible bug in the wrapper, validation flow, or admin panel.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core wrapper
        - Native interop
        - Linux regression
        - Windows regression
        - Admin panel
        - Packaging / release
        - Documentation
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Provide exact steps, commands, and if relevant token/module details.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / error output
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation context
      description: Which tests or scripts were run?
